<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02030a"/>
      <stop offset="100%" stop-color="#0a0e2c"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#8b3cf7"/>
    </linearGradient>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3d71" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ff3d71" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect x="850" y="0" width="350" height="300" fill="url(#glowPink)"/>
  <rect x="0" y="0" width="350" height="300" fill="url(#glowCyan)"/>

  <!-- neural network, corners only, well clear of center text -->
  <g stroke="#00d2ff" stroke-width="0.6">
    <line x1="60" y1="40" x2="150" y2="90" opacity="0.35"/>
    <line x1="150" y1="90" x2="90" y2="160" opacity="0.3"/>
    <line x1="150" y1="90" x2="230" y2="60" opacity="0.3"/>
    <line x1="90" y1="160" x2="180" y2="220" opacity="0.28"/>
    <line x1="230" y1="60" x2="300" y2="120" opacity="0.25"/>
    <line x1="1000" y1="50" x2="1080" y2="110" opacity="0.35"/>
    <line x1="1080" y1="110" x2="1020" y2="180" opacity="0.3"/>
    <line x1="1080" y1="110" x2="1150" y2="70" opacity="0.3"/>
    <line x1="1020" y1="180" x2="1100" y2="240" opacity="0.28"/>
    <line x1="940" y1="200" x2="1020" y2="180" opacity="0.25"/>
  </g>

  <g fill="#00d2ff">
    <circle cx="60" cy="40" r="2.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="90" r="2.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="160" r="2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="60" r="2.2"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.9s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="220" r="2"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="3.1s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="120" r="1.8"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.4s" begin="1.4s" repeatCount="indefinite"/></circle>

    <circle cx="1000" cy="50" r="2.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="110" r="2.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="180" r="2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="70" r="2.2"><animate attributeName="opacity" values="0.35;1;0.35" dur="2.8s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="240" r="2"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="3.2s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="200" r="1.8"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.7s" begin="1.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title -->
  <text x="600" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="url(#titleGrad)" letter-spacing="3">MAYANK AGRAWAL</text>

  <!-- subtitle, static, no adjacent elements that depend on its rendered width -->
  <text x="600" y="182" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#8899b0" letter-spacing="1">
    Founder, ZethraOS &#160;&#183;&#160; AI Systems Engineer &#160;&#183;&#160; Bengaluru, India
  </text>

  <!-- bottom divider -->
  <rect x="450" y="230" width="300" height="1.5" fill="#00d2ff" opacity="0.5"/>

  <text x="600" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4a5e78" letter-spacing="2">BUILDING THE AI-NATIVE OS FOR EVERY SCREEN</text>
</svg>
